version: "3.8"

services:
  livechat:
    build: .
    container_name: livechat-system
    ports:
      - "5000:5000"
    volumes:
      - ./instance:/app/instance
      - ./app/static/uploads:/app/app/static/uploads
    environment:
      - SECRET_KEY=change-this-to-a-long-random-string
      - DEFAULT_API_KEY=demo-api-key-123
      - FLASK_DEBUG=0
      - PORT=5000
    restart: unless-stopped
