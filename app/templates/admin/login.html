<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login · Live Chat</title>
<link rel="stylesheet" href="{{ url_for('static', filename='admin/css/admin.css') }}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand"><span class="brand-dot"></span> LiveChat Admin</div>
    <p class="login-sub">Sign in to manage your conversations</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <label>Email</label>
      <input type="email" name="email" placeholder="owner@example.com" required autofocus>
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <button type="submit" class="btn-primary btn-block">Login</button>
    </form>
    <p class="login-hint">Default: owner@example.com / Owner@123 (change after first login)</p>
  </div>
</body>
</html>
