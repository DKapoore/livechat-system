<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Chat Widget Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f7fb;
    color:#333;
}

header{
    background:#2563eb;
    color:#fff;
    padding:20px;
    text-align:center;
}

.container{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

button{
    padding:12px 20px;
    border:none;
    background:#2563eb;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}

#status{
    margin-top:20px;
    padding:15px;
    background:#f1f5f9;
    border-radius:8px;
    font-size:14px;
    white-space:pre-wrap;
}
</style>

</head>
<body>

<header>
<h1>Live Chat Widget Demo</h1>
<p>Widget Integration Test</p>
</header>

<div class="container">

<div class="card">

<h2>Widget Status</h2>

<p>
If everything is configured correctly, a floating chat button should appear
at the bottom-right corner.
</p>

<div id="status">
Loading widget...
</div>

</div>

</div>

<script>

window.onerror=function(msg,url,line,col,error){
    document.getElementById("status").innerHTML +=
    "\n\n❌ JavaScript Error:\n"+msg+
    "\nFile : "+url+
    "\nLine : "+line;
};

</script>

<script src="https://livechat-system.onrender.com/widget.js"></script>

<script>

document.getElementById("status").innerHTML +=
"\n\n✅ widget.js Loaded";

if(typeof LiveChat==="undefined"){

    document.getElementById("status").innerHTML +=
    "\n\n❌ LiveChat object NOT FOUND";

}else{

    document.getElementById("status").innerHTML +=
    "\n\n✅ LiveChat object FOUND";

    LiveChat.init({

        apiKey:"demo-api-key-123",

        serverUrl:"https://livechat-system.onrender.com"

    });

    document.getElementById("status").innerHTML +=
    "\n\n🚀 LiveChat.init() Called";

}

</script>

</body>
</html>
